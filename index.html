<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haven</title>
    <script>
      // Applied synchronously, before first paint, to avoid a flash of the wrong theme.
      // Reconciled against the SQLite settings table (source of truth) once the DB loads.
      (function () {
        var cached = localStorage.getItem("haven-theme");
        var theme =
          cached === "light" || cached === "dark"
            ? cached
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);

        // Accent color — replay the resolved values cached by applyAccent()
        // (single source of truth is ACCENT_PRESETS in useSettingsStore). This
        // runs before any module loads, so it just reads the cache; the DB
        // reconciles the real value shortly after.
        try {
          var raw = localStorage.getItem("haven-accent-vars");
          if (raw) {
            var p = JSON.parse(raw);
            var vals = theme === "light" ? p.l : p.d;
            if (vals) {
              var s = document.documentElement.style;
              s.setProperty("--color-accent", vals[0]);
              s.setProperty("--color-accent-hover", vals[1]);
              s.setProperty("--color-accent-active", vals[2]);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
