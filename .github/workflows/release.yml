name: Release

# Builds Haven on native macOS, Windows, and Linux runners and publishes the installers
# to a GitHub Release. Triggered by pushing a version tag (e.g. v1).
on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const tag = context.ref.replace('refs/tags/', '')
            const version = tag.replace(/^v/, '')

            const escapeRe = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8')
            const headingRe = new RegExp(`^## (?:${escapeRe(tag)}|${escapeRe(version)})\\s*$`, 'm')
            const match = headingRe.exec(changelog)

            let body = 'Download the installer for your platform below.'
            if (match) {
              const rest = changelog.slice(match.index + match[0].length)
              const nextHeading = rest.search(/^## /m)
              const section = (nextHeading === -1 ? rest : rest.slice(0, nextHeading)).trim()
              if (section) {
                body = `${section}\n\n---\n\nDownload the installer for your platform below.`
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Haven ${tag}`,
              body,
              draft: true,
              prerelease: false,
            })
            return data.id

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS (Apple Silicon + Intel) -> .app + .dmg
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Windows -> NSIS .exe + .msi installers
          - platform: windows-latest
            args: ''
            rust-targets: ''
          # Linux -> .deb, .rpm, .AppImage
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const version = context.ref.replace('refs/tags/', '').replace(/^v/, '')

            const pkgPath = 'package.json'
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            pkg.version = version
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n')

            const tauriConfPath = 'src-tauri/tauri.conf.json'
            const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'))
            tauriConf.version = version
            fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + '\n')

            const cargoTomlPath = 'src-tauri/Cargo.toml'
            const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8')
            fs.writeFileSync(cargoTomlPath, cargoToml.replace(/^version = ".*"/m, `version = "${version}"`))

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libxdo-dev \
            libssl-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: '-'
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build]
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
            })
